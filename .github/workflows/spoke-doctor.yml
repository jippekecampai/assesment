name: spoke-doctor

on:
  push:
  pull_request:

jobs:
  doctor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install
      - name: Contract-check (spoke-doctor)
        run: npm run doctor
      - name: Syntax-check
        run: npm run check
      - name: Unit tests
        run: npm test
