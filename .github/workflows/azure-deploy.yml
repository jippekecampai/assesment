name: Deploy to Azure (App Service)

# Deployt de app naar de bestaande test-Web App zodra er naar main gemerged wordt.
# Vereist eenmalig één GitHub-secret: AZURE_WEBAPP_PUBLISH_PROFILE
# (Azure Portal > App Service > "Download publish profile" > inhoud als secret plakken).
# De deploy draait op GitHub's runners (die wél bij Azure mogen); het secret blijft
# in GitHub's secret-kluis en wordt nooit in de code of logs zichtbaar.

on:
  push:
    branches: [main]
  workflow_dispatch: {}

concurrency:
  group: azure-deploy
  cancel-in-progress: true

env:
  AZURE_WEBAPP_NAME: cmp-app-assessment-test-weu-001
  NODE_VERSION: "22"

jobs:
  # 1) Contract-checks als gate — niet deployen als doctor/check/test rood is.
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: npm install
      - name: Contract-check (spoke-doctor)
        run: npm run doctor
      - name: Syntax-check
        run: npm run check
      - name: Unit tests
        run: npm test

  # 2) Productie-build + deploy naar Azure App Service.
  deploy:
    needs: verify
    runs-on: ubuntu-latest
    environment:
      name: test
      url: https://cmp-app-assessment-test-weu-001.azurewebsites.net
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
      - name: Productie-dependencies installeren
        run: npm ci --omit=dev
      - name: Deploy naar Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: .
