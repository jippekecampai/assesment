# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy Node.js app to Azure Web App - cmp-app-assessment-test-weu-001

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write # vereist voor OIDC-login bij Azure
      contents: read # vereist voor actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js version
        uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install dependencies
        run: npm ci

      - name: Build (Vite -> dist/)
        run: npm run build

      - name: Prune naar productie-dependencies
        # server.mjs draait op Node; React/Mantine zijn build-only. Houd alleen
        # runtime-deps (o.a. @azure/data-tables) over zodat het pakket licht blijft.
        run: npm prune --omit=dev

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_F0EB17EA309541D389F3EC9618ABADBA }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_B2B6E21FA12541678701BBCFC13EF995 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_7B982FF8CA14488F89017A0A31758EF4 }}

      - name: 'Deploy to Azure Web App'
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'cmp-app-assessment-test-weu-001'
          slot-name: 'Production'
          package: .
